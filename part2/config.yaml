seed: 42

data:
  root_dir: "data/processed"
  train_dir: "data/processed/train"
  val_dir: "data/processed/val"
  test_dir: "data/processed/test"
  class_names:
    - Biliary_Leaks
    - Lithiasis
    - Normal
    - Stricture

training:
  image_size: 320
  batch_size: 16
  num_epochs: 60
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 2
  device: "cuda"
  early_stopping_patience: 20
  scheduler: "cosine"
  warmup_epochs: 3
  head_warmup_epochs: 5
  head_lr: 0.001

model:
  name: "efficientnet_b0"
  pretrained: true
  num_classes: 4

loss:
  name: "weighted_cross_entropy" # options: weighted_cross_entropy, focal
  focal_gamma: 2.0
  focal_alpha: null

augmentation:
  use_clahe: false
  strong_aug: true # phase1 validated: +0.17 F1 macro vs weak aug
  random_rotation: 15
  horizontal_flip: true
  vertical_flip: false
  color_jitter: true
  random_erasing: true
  randaugment_n: 2
  randaugment_m: 9

sampling:
  use_weighted_sampler: false # alternative to class weights in loss

outputs:
  models_dir: "models"
  figures_dir: "outputs/figures"
  confusion_matrices_dir: "outputs/confusion_matrices"
  roc_dir: "outputs/roc_curves"
  gradcam_dir: "outputs/gradcam"
  tables_dir: "outputs/tables"
  experiments_dir: "experiments"
